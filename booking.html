<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Бронирование | Golden Paws & Palms</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "primary": "#79603e",
                  "surface": "#fffcf7",
                  "surface-container-low": "#fcf9f3",
                },
                fontFamily: {
                  "headline": ["Noto Serif", "serif"],
                  "body": ["Plus Jakarta Sans", "sans-serif"]
                }
              },
            },
          }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fffcf7; color: #383833; transition: background-color 0.3s, color 0.3s; }
        .dark body { background-color: #1a1a1a; color: #f0f0f0; }
        .glass-panel { background: rgba(255, 252, 247, 0.6); backdrop-filter: blur(20px); }
        .dark .glass-panel { background: rgba(26, 26, 26, 0.6); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-8 bg-surface-container-low dark:bg-zinc-950">
    <nav class="fixed top-0 w-full z-50 glass-panel border-b border-gray-200/10 px-8 py-4 flex justify-between items-center">
        <a href="index.html" class="font-headline text-xl font-bold italic text-primary">Golden Paws & Palms</a>
        <button onclick="location.href='index.html'" class="flex items-center gap-2 text-sm uppercase tracking-widest font-bold text-on-surface/70 hover:text-primary transition-all">
            <span class="material-symbols-outlined">close</span> Закрыть
        </button>
    </nav>

    <div class="max-w-3xl w-full bg-white dark:bg-zinc-900 rounded-[3rem] p-10 md:p-16 shadow-2xl mt-24">
        <h1 class="font-headline text-5xl md:text-6xl mb-6 italic leading-tight text-center">Забронируйте свой поток радости</h1>
        <p class="text-on-surface-variant text-center mb-12 text-lg">Заполните форму ниже, и мы свяжемся с вами для подтверждения бронирования.</p>

        <form onsubmit="return handleBooking(event)" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                    <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block">Ваше Имя</label>
                    <input type="text" required class="w-full bg-surface-container-low border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary transition-all dark:bg-zinc-800">
                </div>
                <div class="space-y-3">
                    <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block">Телефон</label>
                    <input type="tel" required placeholder="+7 (___) ___-__-__" class="w-full bg-surface-container-low border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary transition-all dark:bg-zinc-800">
                </div>
            </div>

            <div class="space-y-3">
                <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block">Выберите Ритм (Класс)</label>
                <select id="rhythm-select" required class="w-full bg-surface-container-low border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary transition-all dark:bg-zinc-800 appearance-none">
                    <option value="" disabled selected>Выберите подходящее занятие</option>
                    <option value="morning-zen">Утренний Дзен</option>
                    <option value="evening-med">Вечерняя Медитация</option>
                    <option value="puppy-pilates">Пилатес с Малышами</option>
                    <option value="beginner-yoga">Йога для Начинающих</option>
                    <option value="power-flow">Силовой Поток</option>
                    <option value="vinyasa-flow">Виньяса-Флоу</option>
                    <option value="family-rhythm">Семейный Ритм</option>
                    <option value="night-shanti">Ночной Шанти</option>
                </select>
            </div>

            <div class="space-y-3">
                <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block">Предпочтительная Дата</label>
                <input type="date" required class="w-full bg-surface-container-low border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary transition-all dark:bg-zinc-800">
            </div>

            <div class="space-y-3">
                <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block">Комментарии (необязательно)</label>
                <textarea rows="4" class="w-full bg-surface-container-low border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary transition-all dark:bg-zinc-800"></textarea>
            </div>

            <button type="submit" class="w-full bg-primary text-white py-6 rounded-full font-bold text-xl hover:shadow-2xl transition-all">Отправить запрос</button>
        </form>

        <div id="success-msg" class="hidden text-center p-12 space-y-6">
            <span class="material-symbols-outlined text-7xl text-green-500">check_circle</span>
            <h2 class="font-headline text-4xl italic">Спасибо! Запрос принят.</h2>
            <p class="text-on-surface-variant">Мы перезвоним вам в течение часа.</p>
            <button onclick="location.href='index.html'" class="border border-outline-variant px-8 py-3 rounded-full font-bold">Вернуться на главную</button>
        </div>
    </div>

    <script>
        function handleBooking(e) {
            e.preventDefault();
            e.target.classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
            return false;
        }

        // Auto-select rhythm if passed from query param
        const params = new URLSearchParams(window.location.search);
        const rhythm = params.get('class');
        if (rhythm) {
            const select = document.getElementById('rhythm-select');
            if (select.querySelector(`option[value="${rhythm}"]`)) {
                select.value = rhythm;
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
